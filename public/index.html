<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; min-height: 100vh; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: #f8fafc; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; background: #1e293b; color: #94a3b8; }
    .tab.active { background: #6366f1; color: #fff; }
    .pane { display: none; }
    .pane.active { display: block; }
    .panel { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #334155; cursor: pointer; }
    .row:hover { background: #1e3a5f22; }
    .badge { background: #ef4444; color: #fff; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; margin-left: 8px; }
    .badge.green { background: #22c55e; }
    .badge.orange { background: #f59e0b; }
    .badge.blue { background: #3b82f6; }
    .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 12px; }
    .kpi { background: #1e293b; border-radius: 12px; padding: 16px; }
    .kpi-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
    .kpi-val { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    input[type=text] { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; flex: 1; outline: none; }
    button.btn { background: #6366f1; border: none; border-radius: 8px; padding: 8px 14px; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
    button.btn.red { background: #ef4444; }
    button.btn.green { background: #22c55e; }
    button.btn.gray { background: #334155; }
    button.btn.blue { background: #3b82f6; }
    .tag { font-size: 11px; color: #64748b; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 80px; margin-top: 12px; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { width: 100%; background: #6366f1; border-radius: 4px 4px 0 0; min-height: 4px; }
    .soon { border-left: 3px solid #f59e0b !important; padding-left: 10px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1e293b; border-radius: 16px; padding: 24px; max-width: 700px; width: 100%; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: #334155; border: none; color: #e2e8f0; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #f8fafc; }
    .modal-meta { font-size: 12px; color: #64748b; margin-bottom: 16px; }
    .modal-body { font-size: 13px; color: #cbd5e1; line-height: 1.6; white-space: pre-wrap; max-height: 400px; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 12px; }
    .modal-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .attendee { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #334155; font-size: 13px; }
    .attendee-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-accepted { background: #22c55e; }
    .status-declined { background: #ef4444; }
    .status-tentative { background: #f59e0b; }
    .status-needsAction { background: #64748b; }
    .meet-link { display: inline-flex; align-items: center; gap: 6px; background: #1a73e8; color: #fff; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; }
    .cal-link { display: inline-flex; align-items: center; gap: 6px; background: #334155; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; }
    .login-banner { background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 16px; }
    .login-banner a { color: #6366f1; font-weight: 700; text-decoration: none; font-size: 15px; }
  </style>
</head>
<body>

<h1>🖥 Mon Dashboard</h1>

<div id="auth-banner" class="login-banner" style="display:none">
  ⚠️ Tu n'es pas connecté. <a href="/auth">👉 Connecte-toi avec Google</a>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab(0)">📧 Emails</button>
  <button class="tab" onclick="showTab(1)">🗓 Agenda</button>
  <button class="tab" onclick="showTab(2)">⏱ Meetings</button>
  <button class="tab" onclick="showTab(3)">✅ To-do</button>
  <button class="tab" onclick="showTab(4)">📤 Rapports</button>
</div>

<!-- EMAILS -->
<div class="pane active" id="pane-0">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-weight:700">Emails non lus <span class="badge" id="email-count">0</span></span>
    <button class="btn" onclick="loadEmails()">🔄 Rafraîchir</button>
  </div>
  <div id="email-list"><div style="color:#64748b">Chargement...</div></div>
</div>

<!-- AGENDA -->
<div class="pane" id="pane-1">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-weight:700">7 prochains jours</span>
    <button class="btn" onclick="loadEvents()">🔄 Rafraîchir</button>
  </div>
  <div id="event-list"><div style="color:#64748b">Chargement...</div></div>
</div>

<!-- MEETINGS -->
<div class="pane" id="pane-2">
  <div class="grid3">
    <div class="kpi"><div class="kpi-label">Heures cette semaine</div><div class="kpi-val" id="m-hours">—</div></div>
    <div class="kpi"><div class="kpi-label">Réunions (4 sem.)</div><div class="kpi-val" id="m-count">—</div></div>
    <div class="kpi"><div class="kpi-label">Meeting récurrent</div><div style="font-size:13px;font-weight:600;color:#f1f5f9;margin-top:4px" id="m-top">—</div></div>
  </div>
  <div class="panel">
    <div style="font-weight:600;margin-bottom:4px">Heures par semaine</div>
    <div class="bar-chart" id="bar-chart"><div style="color:#64748b">Chargement...</div></div>
  </div>
  <button class="btn" onclick="loadEvents()">🔄 Rafraîchir</button>
</div>

<!-- TO-DO -->
<div class="pane" id="pane-3">
  <div class="input-row">
    <input type="text" id="todo-input" placeholder="Nouvelle tâche..." onkeydown="if(event.key==='Enter')addTodo()"/>
    <button class="btn" onclick="addTodo()">＋</button>
  </div>
  <div id="todo-list"></div>
</div>

<!-- RAPPORTS & ALERTES -->
<div class="pane" id="pane-4">
  <div class="grid2">
    <div class="panel">
      <div style="font-weight:700;margin-bottom:12px">📤 Rapports <span class="badge green" id="report-count">0</span></div>
      <div class="input-row">
        <input type="text" id="report-input" placeholder="Nom du rapport..." onkeydown="if(event.key==='Enter')addReport()"/>
        <button class="btn green" onclick="addReport()">＋</button>
      </div>
      <div id="report-list"></div>
    </div>
    <div class="panel">
      <div style="font-weight:700;margin-bottom:12px">🔴 Alertes <span class="badge" id="alert-count">0</span></div>
      <div class="input-row">
        <input type="text" id="alert-input" placeholder="Nouvelle alerte..." onkeydown="if(event.key==='Enter')addAlert()"/>
        <button class="btn red" onclick="addAlert()">＋</button>
      </div>
      <div id="alert-list"></div>
    </div>
  </div>
</div>

<!-- MODAL EMAIL -->
<div class="modal-overlay" id="email-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('email-modal')">✕ Fermer</button>
    <h2 id="modal-email-subject"></h2>
    <div class="modal-meta" id="modal-email-meta"></div>
    <div class="modal-actions">
      <a id="modal-email-link" href="#" target="_blank" class="btn blue" style="text-decoration:none">📬 Ouvrir dans Gmail</a>
    </div>
    <div class="modal-body" id="modal-email-body"></div>
  </div>
</div>

<!-- MODAL EVENT -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('event-modal')">✕ Fermer</button>
    <h2 id="modal-event-title"></h2>
    <div class="modal-meta" id="modal-event-meta"></div>
    <div class="modal-actions" id="modal-event-actions"></div>
    <div id="modal-event-description" style="margin-bottom:12px"></div>
    <div id="modal-event-attendees"></div>
  </div>
</div>

<script>
  let todos = [], reports = [], alerts = [], allEvents = [], allEmails = [];

  function showTab(i) {
    document.querySelectorAll('.pane').forEach((p,j) => p.classList.toggle('active', i===j));
    document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // Fermer modal en cliquant dehors
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  });

  function openEmailModal(email) {
    document.getElementById('modal-email-subject').textContent = email.subject || '(sans objet)';
    document.getElementById('modal-email-meta').textContent = `De : ${email.from} — ${email.date}`;
    document.getElementById('modal-email-link').href = email.gmailUrl;
    // Nettoyer le HTML basique
    const body = email.body
      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
      .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '')
      .replace(/<[^>]+>/g, ' ')
      .replace(/&nbsp;/g, ' ')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/\s{3,}/g, '\n\n')
      .trim();
    document.getElementById('modal-email-body').textContent = body || email.snippet;
    openModal('email-modal');
  }

  function openEventModal(ev) {
    document.getElementById('modal-event-title').textContent = ev.title;
    const start = new Date(ev.start);
    const end = new Date(ev.end);
    const dur = Math.round((end - start) / 60000);
    document.getElementById('modal-event-meta').textContent =
      `${start.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})} · ${start.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})} – ${end.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})} (${dur} min)${ev.location ? ' · 📍 ' + ev.location : ''}`;

    // Actions
    let actions = '';
    if (ev.meetLink) actions += `<a href="${ev.meetLink}" target="_blank" class="meet-link">🎥 Rejoindre le Meet</a>`;
    if (ev.calendarUrl) actions += `<a href="${ev.calendarUrl}" target="_blank" class="cal-link">📅 Ouvrir dans Calendar</a>`;
    document.getElementById('modal-event-actions').innerHTML = actions;

    // Description
    if (ev.description) {
      const clean = ev.description.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g, ' ').trim();
      document.getElementById('modal-event-description').innerHTML = `<div style="font-size:13px;color:#94a3b8;background:#0f172a;border-radius:8px;padding:12px;margin-bottom:12px">${clean}</div>`;
    } else {
      document.getElementById('modal-event-description').innerHTML = '';
    }

    // Participants
    if (ev.attendees?.length) {
      const statusLabel = { accepted: '✅', declined: '❌', tentative: '❓', needsAction: '⏳' };
      document.getElementById('modal-event-attendees').innerHTML = `
        <div style="font-weight:600;font-size:13px;margin-bottom:8px">👥 Participants (${ev.attendees.length})</div>
        ${ev.attendees.map(a => `
          <div class="attendee">
            <span class="attendee-status status-${a.status}"></span>
            <span style="flex:1">${a.name}</span>
            <span style="font-size:11px;color:#64748b">${statusLabel[a.status] || ''}</span>
          </div>`).join('')}`;
    } else {
      document.getElementById('modal-event-attendees').innerHTML = '';
    }

    openModal('event-modal');
  }

  async function loadEmails() {
    document.getElementById('email-list').innerHTML = '<div style="color:#64748b">Chargement...</div>';
    const res = await fetch('/api/emails');
    if (res.status === 401) { showAuthBanner(); return; }
    allEmails = await res.json();
    document.getElementById('email-count').textContent = allEmails.length;
    document.getElementById('email-list').innerHTML = allEmails.length === 0
      ? '<div style="color:#64748b">Aucun email non lu</div>'
      : allEmails.map((m, i) => `
        <div class="row" onclick="openEmailModal(allEmails[${i}])">
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px;margin-bottom:2px">${m.subject || '(sans objet)'}</div>
            <div style="color:#94a3b8;font-size:12px">${m.from}</div>
            <div style="color:#64748b;font-size:12px;margin-top:2px">${m.snippet}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:12px">
            <div class="tag">${m.date?.slice(0,16)||''}</div>
            <div style="font-size:11px;color:#6366f1">Voir →</div>
          </div>
        </div>`).join('');
  }

  async function loadEvents() {
    document.getElementById('event-list').innerHTML = '<div style="color:#64748b">Chargement...</div>';
    const res = await fetch('/api/events');
    if (res.status === 401) { showAuthBanner(); return; }
    allEvents = await res.json();
    renderEvents();
    renderMeetings();
  }

  function renderEvents() {
    const now = new Date();
    document.getElementById('event-list').innerHTML = allEvents.length === 0
      ? '<div style="color:#64748b">Aucun événement</div>'
      : allEvents.map((e, i) => {
          const start = new Date(e.start);
          const diff = start - now;
          const soon = diff > 0 && diff < 30 * 60000;
          return `<div class="row${soon?' soon':''}" onclick="openEventModal(allEvents[${i}])">
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${e.title}${soon?' <span class="badge orange">⚠ Bientôt</span>':''} ${e.meetLink?'<span class="badge blue">🎥 Meet</span>':''}</div>
              ${e.location ? `<div style="color:#64748b;font-size:12px">📍 ${e.location}</div>` : ''}
              ${e.attendees?.length ? `<div style="color:#64748b;font-size:12px">👥 ${e.attendees.length} participants</div>` : ''}
            </div>
            <div class="tag" style="text-align:right;margin-left:12px">
              <div>${start.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
              <div>${start.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
              <div style="color:#6366f1;margin-top:2px">Voir →</div>
            </div>
          </div>`;
        }).join('');
  }

  function renderMeetings() {
    if (!allEvents.length) return;
    const now = new Date();
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    let hoursThisWeek = 0;
    const titleCount = {}, weekMap = {};
    allEvents.forEach(e => {
      const s = new Date(e.start), en = new Date(e.end);
      const dur = (en - s) / 3600000;
      if (s >= weekStart) hoursThisWeek += dur;
      titleCount[e.title] = (titleCount[e.title] || 0) + 1;
      const w = e.start?.slice(0, 7);
      weekMap[w] = (weekMap[w] || 0) + dur;
    });
    const top = Object.entries(titleCount).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('m-hours').textContent = Math.round(hoursThisWeek*10)/10 + 'h';
    document.getElementById('m-count').textContent = allEvents.length;
    document.getElementById('m-top').textContent = top ? `${top[0]} (×${top[1]})` : '—';
    const weeks = Object.entries(weekMap).sort().slice(-4);
    const maxH = Math.max(...weeks.map(w => w[1]), 1);
    document.getElementById('bar-chart').innerHTML = weeks.map(([w, h]) => `
      <div class="bar-wrap">
        <div style="font-size:11px;color:#94a3b8">${Math.round(h*10)/10}h</div>
        <div class="bar" style="height:${(h/maxH)*60}px"></div>
        <div style="font-size:10px;color:#64748b">${w}</div>
      </div>`).join('');
  }

  function addTodo() {
    const input = document.getElementById('todo-input');
    if (!input.value.trim()) return;
    todos.push({ id: Date.now(), text: input.value.trim(), done: false });
    input.value = '';
    renderTodos();
  }

  function renderTodos() {
    document.getElementById('todo-list').innerHTML = todos.length === 0
      ? '<div style="color:#64748b">Aucune tâche</div>'
      : todos.map(t => `
        <div class="row" style="cursor:default">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})" style="margin-right:10px;cursor:pointer"/>
          <span style="flex:1;text-decoration:${t.done?'line-through':'none'};color:${t.done?'#64748b':'#e2e8f0'};font-size:14px">${t.text}</span>
          <div style="display:flex;gap:6px;margin-left:8px">
            <button class="btn gray" onclick="editTodo(${t.id})">✏️</button>
            <button class="btn red" onclick="deleteTodo(${t.id})">✕</button>
          </div>
        </div>`).join('');
  }

  function toggleTodo(id) { todos = todos.map(t => t.id===id ? {...t, done:!t.done} : t); renderTodos(); }
  function deleteTodo(id) { todos = todos.filter(t => t.id!==id); renderTodos(); }
  function editTodo(id) {
    const t = todos.find(x => x.id===id);
    const text = prompt('Modifier la tâche :', t.text);
    if (text !== null) { todos = todos.map(x => x.id===id ? {...x, text} : x); renderTodos(); }
  }

  function addReport() {
    const input = document.getElementById('report-input');
    if (!input.value.trim()) return;
    reports.push({ id: Date.now(), text: input.value.trim(), time: new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) });
    input.value = '';
    renderReports();
  }

  function addAlert() {
    const input = document.getElementById('alert-input');
    if (!input.value.trim()) return;
    alerts.push({ id: Date.now(), text: input.value.trim(), time: new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) });
    input.value = '';
    renderAlerts();
  }

  function renderReports() {
    document.getElementById('report-count').textContent = reports.length;
    document.getElementById('report-list').innerHTML = reports.length === 0
      ? '<div style="color:#64748b;font-size:13px">Aucun rapport</div>'
      : reports.map(r => `
        <div class="row" style="cursor:default;font-size:13px">
          <span style="flex:1">${r.text}</span>
          <span class="tag" style="margin-left:8px">${r.time}</span>
          <button class="btn red" style="padding:4px 8px;margin-left:6px" onclick="reports=reports.filter(x=>x.id!==${r.id});renderReports()">✕</button>
        </div>`).join('');
  }

  function renderAlerts() {
    document.getElementById('alert-count').textContent = alerts.length;
    document.getElementById('alert-list').innerHTML = alerts.length === 0
      ? '<div style="color:#64748b;font-size:13px">Aucune alerte</div>'
      : alerts.map(a => `
        <div class="row" style="cursor:default;font-size:13px">
          <span style="flex:1">${a.text}</span>
          <span class="tag" style="margin-left:8px">${a.time}</span>
          <button class="btn red" style="padding:4px 8px;margin-left:6px" onclick="alerts=alerts.filter(x=>x.id!==${a.id});renderAlerts()">✕</button>
        </div>`).join('');
  }

  function showAuthBanner() {
    document.getElementById('auth-banner').style.display = 'block';
  }

  loadEmails();
  loadEvents();
</script>
</body>
</html>
